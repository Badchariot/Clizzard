<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SKY INVADERS — Ground Defense</title>
<style>
  :root{
    --phosphor:#5dff6d;
    --alert:#ff4d4d;
    --ufo:#ff66e0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000}
  body{
    font-family:"Courier New",ui-monospace,monospace;
    color:var(--phosphor);
    user-select:none;-webkit-user-select:none;
  }
  #game{position:fixed;inset:0;cursor:none;display:block}
  #crt{
    position:fixed;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  #vignette{
    position:fixed;inset:0;pointer-events:none;z-index:6;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  .hud{
    position:fixed;z-index:10;pointer-events:none;
    text-shadow:0 0 6px var(--phosphor),0 0 14px rgba(93,255,109,.4);
    letter-spacing:.18em;font-weight:bold;
  }
  #score{top:14px;left:18px;font-size:clamp(13px,2vw,18px)}
  #hiscore{top:14px;left:50%;transform:translateX(-50%);font-size:clamp(13px,2vw,18px);text-align:center}
  #waveLabel{top:14px;right:18px;font-size:clamp(13px,2vw,18px);text-align:right}
  #lives{bottom:16px;left:18px;font-size:clamp(13px,2vw,18px)}
  #ammo{bottom:16px;left:50%;transform:translateX(-50%);font-size:clamp(14px,2.2vw,20px);text-align:center}
  #ammo .empty{color:var(--alert);text-shadow:0 0 8px var(--alert)}
  #msg{
    top:50%;left:50%;transform:translate(-50%,-50%);
    text-align:center;font-size:clamp(16px,3.4vw,30px);line-height:1.9;white-space:pre;
  }
  #msg .sub{font-size:.55em;opacity:.85;letter-spacing:.3em}
  #msg .alert{color:var(--alert);text-shadow:0 0 8px var(--alert)}
  #hitFlash{
    position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse at center, rgba(255,40,40,.55), rgba(120,0,0,.25));
    opacity:0;transition:opacity .08s linear;
  }
  #controlsHint{
    position:fixed;bottom:16px;right:18px;z-index:10;pointer-events:none;
    font-size:clamp(10px,1.4vw,13px);letter-spacing:.12em;opacity:.55;text-align:right;line-height:1.7;
    text-shadow:0 0 6px var(--phosphor);
  }
  .blink{animation:blink 1.1s steps(2,start) infinite}
  @keyframes blink{50%{opacity:0}}
  @media (prefers-reduced-motion: reduce){ .blink{animation:none} }

  /* ---- mobile touch controls ---- */
  #touchControls{display:none}
  body.touch #touchControls{
    display:block;position:fixed;inset:0;z-index:11;pointer-events:none;
  }
  body.touch #controlsHint{display:none}
  .mgroup{
    position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);
    display:flex;flex-direction:column;gap:8px;align-items:center;
  }
  .mgroup.mleft{left:calc(env(safe-area-inset-left,0px) + 18px)}
  .mgroup.mright{right:calc(env(safe-area-inset-right,0px) + 18px)}
  .mlabel{
    font-family:"Courier New",monospace;font-size:11px;letter-spacing:.28em;
    color:var(--phosphor);opacity:.6;text-shadow:0 0 6px var(--phosphor);
  }
  .mrow{display:flex;gap:14px}
  .mtop{display:flex;gap:12px;align-items:center;margin-bottom:2px}
  .mbtn{
    pointer-events:auto;touch-action:none;-webkit-tap-highlight-color:transparent;
    display:flex;align-items:center;justify-content:center;
    width:72px;height:72px;border-radius:50%;
    font-family:"Courier New",monospace;font-weight:bold;font-size:26px;letter-spacing:.05em;
    color:var(--phosphor);
    background:rgba(6,20,10,0.5);
    border:2px solid rgba(93,255,109,0.55);
    box-shadow:0 0 14px rgba(93,255,109,0.25), inset 0 0 12px rgba(93,255,109,0.12);
    text-shadow:0 0 8px var(--phosphor);
    backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
    transition:transform .05s, background .05s;
  }
  .mbtn.small{width:52px;height:52px;font-size:22px;opacity:.9}
  .mbtn.aim{
    border-color:rgba(255,217,138,0.7);color:var(--amber,#ffd98a);
    background:rgba(40,30,6,0.5);
    box-shadow:0 0 14px rgba(255,217,138,0.3), inset 0 0 12px rgba(255,217,138,0.14);
    text-shadow:0 0 8px #ffd98a;
  }
  .mbtn.auto{
    width:auto;height:52px;padding:0 16px;border-radius:26px;font-size:15px;letter-spacing:.14em;
    color:#fff;border-color:rgba(255,120,120,0.7);background:rgba(60,10,10,0.5);
    box-shadow:0 0 14px rgba(255,90,90,0.3);text-shadow:0 0 8px var(--alert);
  }
  .mbtn.fire{
    width:80px;height:80px;font-size:19px;
    color:#fff;border-color:rgba(255,120,120,0.85);
    background:rgba(60,10,10,0.55);
    box-shadow:0 0 18px rgba(255,90,90,0.4), inset 0 0 16px rgba(255,90,90,0.16);
    text-shadow:0 0 8px var(--alert);
  }
  .mbtn.auto.on{
    color:#fff;border-color:rgba(255,90,90,1);background:rgba(200,40,40,0.7);
    box-shadow:0 0 20px rgba(255,90,90,0.7);
    animation:autoPulse 0.8s ease-in-out infinite;
  }
  @keyframes autoPulse{50%{box-shadow:0 0 30px rgba(255,90,90,0.95)}}
  .mbtn.active{transform:scale(0.9);background:rgba(93,255,109,0.28)}
  .mbtn.aim.active{background:rgba(255,217,138,0.32)}
  .mbtn.fire.active{background:rgba(255,90,90,0.42)}
  :root{--amber:#ffd98a}
  @media (prefers-reduced-motion: reduce){ .mbtn.auto.on{animation:none} }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hitFlash"></div>
<div id="crt"></div>
<div id="vignette"></div>

<div class="hud" id="score">SCORE 0000</div>
<div class="hud" id="hiscore">HI-SCORE 0000</div>
<div class="hud" id="waveLabel">WAVE 01</div>
<div class="hud" id="lives">CANNONS ▲▲▲</div>
<div class="hud" id="ammo"></div>
<div class="hud" id="msg"></div>
<div class="hud" id="controlsHint">MOUSE AIM · CLICK / SPACE FIRE · R RELOAD<br>A D ◄ ► RUN BETWEEN SHIELDS</div>

<!-- mobile controls (shown only on touch devices) -->
<div id="touchControls">
  <div class="mgroup mleft">
    <div class="mlabel">RUN</div>
    <div class="mrow">
      <div class="mbtn" id="btnLeft">◄</div>
      <div class="mbtn" id="btnRight">►</div>
    </div>
  </div>
  <div class="mgroup mright">
    <div class="mtop">
      <div class="mbtn small" id="btnReload">⟳</div>
      <div class="mbtn auto" id="btnAuto">AUTO ○</div>
    </div>
    <div class="mlabel">AIM · FIRE · AIM</div>
    <div class="mrow">
      <div class="mbtn aim" id="btnAimL">◄</div>
      <div class="mbtn fire" id="btnFire">FIRE</div>
      <div class="mbtn aim" id="btnAimR">►</div>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   SKY INVADERS v3 — first-person ground gunner.
   • The classic grid hangs overhead in a TIGHT block (lateral
     spread is compressed so it always reads like the original
     board tipped on its head) and steps down in altitude.
   • You RUN along the ground: the whole sky sweeps past you,
     shields slide overhead, ground ticks scroll under your
     feet, and a radar strip shows you / shields / incoming
     bombs so positioning matters.
   • Their zigzag shots fall in columns aimed at your lane.
     Shoot them, or get under a shield.
   • 5-round magazine. Empty = look down to the horizon and
     reload, blind, while the march keeps coming.
   ============================================================ */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W=0, H=0, CX=0, CY=0, FOCAL=0, DPR=1;

function resize(){
  DPR = devicePixelRatio||1;
  W = canvas.width  = window.innerWidth  * DPR;
  H = canvas.height = window.innerHeight * DPR;
  canvas.style.width = window.innerWidth+"px";
  canvas.style.height= window.innerHeight+"px";
  CX = W/2; CY = H/2;
  FOCAL = Math.min(W,H) * 1.05;
}
window.addEventListener("resize", resize); resize();

/* ---------- tiny WebAudio arcade synth ---------- */
const AC = new (window.AudioContext||window.webkitAudioContext)();
function blip(freq, dur=0.08, type="square", vol=0.16, slide=0){
  if(AC.state==="suspended") AC.resume();
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, AC.currentTime);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide), AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime+dur+0.02);
}
function noiseBurst(dur=0.25, vol=0.25, lp=900){
  if(AC.state==="suspended") AC.resume();
  const n=AC.sampleRate*dur, buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*(1-i/n);
  const s=AC.createBufferSource(); s.buffer=buf;
  const g=AC.createGain(); g.gain.value=vol;
  const f=AC.createBiquadFilter(); f.type="lowpass"; f.frequency.value=lp;
  s.connect(f); f.connect(g); g.connect(AC.destination); s.start();
}
const MARCH=[110,98,87,78]; let marchIdx=0;

/* ---------- pixel sprites ---------- */
const SPRITES = {
  crab:[
    ["00100000100","00010001000","00111111100","01101110110","11111111111","10111111101","10100000101","00011011000"],
    ["00100000100","10010001001","10111111101","11101110111","11111111111","01111111110","00100000100","01000000010"]
  ],
  squid:[
    ["00111100","01111110","11111111","11011011","11111111","00100100","01011010","10100101"],
    ["00111100","01111110","11111111","11011011","11111111","01011010","10000001","01000010"]
  ],
  octo:[
    ["000011110000","011111111110","111111111111","111001100111","111111111111","000110011000","001101101100","110000000011"],
    ["000011110000","011111111110","111111111111","111001100111","111111111111","001110011100","011001100110","001100001100"]
  ],
  ufo:[
    ["0000111111110000","0011111111111100","0111111111111110","1101101101101101","1111111111111111","0011100110011100"]
  ]
};
const spriteCache = {};
function getSprite(name, frame, color){
  const key = name+frame+color;
  if(spriteCache[key]) return spriteCache[key];
  const rows = SPRITES[name][frame % SPRITES[name].length];
  const w = rows[0].length, h = rows.length, px = 8;
  const c = document.createElement("canvas");
  c.width = w*px; c.height = h*px;
  const g = c.getContext("2d");
  g.fillStyle = color;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++)
    if(rows[y][x]==="1") g.fillRect(x*px,y*px,px,px);
  spriteCache[key]=c; return c;
}

/* ---------- stars ---------- */
let stars=[];
for(let i=0;i<150;i++){
  stars.push({x:Math.random()*2-1, y:Math.random()*2-1,
              z:0.3+Math.random()*0.7, tw:Math.random()*Math.PI*2});
}

/* ---------- constants ---------- */
const MAG_SIZE   = 10;
const Z_NEAR     = 110;
const Z_START    = 1500;
const SHIELD_Z   = 340;
const SHIELD_XS  = [-320,-107,107,320];
const SHIELD_W   = 150, SHIELD_H = 170;
const SH_COLS=10, SH_ROWS=6;
const SHIELD_MASK = [
  "0111111110",
  "1111111111",
  "1111111111",
  "1111111111",
  "1110000111",
  "1100000011"
];
const PLAYER_RANGE = 460;        // how far you can run each way
const CAM_MIN_Z = 620;           // parallax saturation (keeps near objects sane)

/* ---------- game state ---------- */
const state = {
  mode:"title",
  score:0, hi:0, wave:1, lives:3,
  camX:0, vel:0,
  aimX:0, aimY:0,
  recoil:0, modeTimer:0, shake:0,
  ammo:MAG_SIZE,
  reloading:false, reloadT:0, look:0,
  stepT:0, sway:0
};
const RELOAD_DOWN=0.35, RELOAD_LOAD=0.95, RELOAD_UP=0.35;
const RELOAD_TOTAL=RELOAD_DOWN+RELOAD_LOAD+RELOAD_UP;

let invaders=[], bolts=[], bombs=[], booms=[], shields=[], ufo=null;
let formation=null;
let keys={};

function fmt(n){ return String(n).padStart(4,"0"); }
const $ = id=>document.getElementById(id);
function hud(){
  $("score").textContent   = "SCORE "+fmt(state.score);
  $("hiscore").textContent = "HI-SCORE "+fmt(state.hi);
  $("waveLabel").textContent = "WAVE "+String(state.wave).padStart(2,"0");
  $("lives").textContent   = "CANNONS "+"▲".repeat(Math.max(0,state.lives));
  const a=$("ammo");
  if(state.reloading) a.innerHTML="<span class='empty blink'>RELOADING…</span>";
  else if(state.ammo<=0) a.innerHTML="<span class='empty blink'>EMPTY — RELOAD</span>";
  else a.textContent = "AMMO "+"▮".repeat(state.ammo)+"▯".repeat(MAG_SIZE-state.ammo);
}

/* ============================================================
   PROJECTION — the trick that keeps the grid tight:
   • lateral POSITION spread is compressed (posS uses a blend
     of true depth and the start depth), so the block stays a
     compact classic grid all the way down…
   • …while SIZE uses true depth (FOCAL/z), so they still grow
     menacingly as they descend…
   • …and CAMERA parallax uses a strong near-saturated scale,
     so RUNNING sweeps everything across your view.
   ============================================================ */
function posS(z){ return FOCAL / (Math.pow(z,0.62)*Math.pow(Z_START,0.38)); }
function camS(z){ return FOCAL / Math.max(z, CAM_MIN_Z); }
function sizeS(z){ return FOCAL / z; }
function project(wx, wy, z){
  const ps=posS(z), cs=camS(z);
  return { x: CX + wx*ps - state.camX*cs, y: CY + wy*ps };
}
function rayAtZ(z){ // world x under the crosshair at altitude z
  return {
    x: (state.aimX - CX + state.camX*camS(z)) / posS(z),
    y: (state.aimY - CY) / posS(z)
  };
}

/* ---------- shields ---------- */
function buildShields(){
  shields = SHIELD_XS.map(x=>{
    const cells=[];
    for(let r=0;r<SH_ROWS;r++){
      cells.push(SHIELD_MASK[r].split("").map(c=>c==="1"?2:0));
    }
    return {x, y:0, cells};
  });
}
function shieldCellAt(wx,wy){
  for(const sh of shields){
    const lx = wx - (sh.x - SHIELD_W/2);
    const ly = wy - (sh.y - SHIELD_H/2);
    if(lx<0||ly<0||lx>=SHIELD_W||ly>=SHIELD_H) continue;
    const c=Math.floor(lx/(SHIELD_W/SH_COLS));
    const r=Math.floor(ly/(SHIELD_H/SH_ROWS));
    if(sh.cells[r][c]>0) return {sh,r,c};
  }
  return null;
}
function damageShield(sh,r,c,radius){
  for(let rr=r-radius;rr<=r+radius;rr++){
    for(let cc=c-radius;cc<=c+radius;cc++){
      if(rr<0||cc<0||rr>=SH_ROWS||cc>=SH_COLS) continue;
      if(Math.abs(rr-r)+Math.abs(cc-c)>radius+0.5) continue;
      if(sh.cells[rr][cc]>0) sh.cells[rr][cc]--;
    }
  }
}
function shieldCoversX(x){ // is there live shield material over this ground x?
  for(const sh of shields){
    if(Math.abs(x-sh.x)<SHIELD_W/2){
      for(let r=0;r<SH_ROWS;r++)for(let c=0;c<SH_COLS;c++)
        if(sh.cells[r][c]>0) return true;
    }
  }
  return false;
}

/* ---------- formation ---------- */
function spawnWave(){
  invaders=[]; bombs=[]; bolts=[]; ufo=null;
  const cols=5, rows=5;                       // 5 lanes across, each 5 DEEP
  const types=["octo","octo","crab","crab","squid"];  // front rank cheap, deepest worth most
  const pts  =[ 10,    10,    20,    20,    30 ];
  const spacing = 150;
  for(let r=0;r<rows;r++){                    // r = depth in the stack (0 = front)
    for(let c=0;c<cols;c++){
      invaders.push({
        gx:(c-(cols-1)/2)*spacing,
        gy:0,                                 // ONE line across the sky
        zOff: r*150,                          // stacked behind each other
        depth:r,
        type:types[r], pts:pts[r],
        alive:true, frame:0
      });
    }
  }
  formation = {
    x:0, y:0, z:Z_START,
    dir:1,
    speed: 52 + state.wave*12,
    limit: 280,
    drop: 80 + state.wave*9,
    frameTimer:0
  };
}
function invZ(inv){ return formation.z + inv.zOff; }
function aliveCount(){ return invaders.filter(i=>i.alive).length; }

/* ---------- input ---------- */
const IS_TOUCH = ("ontouchstart" in window) || navigator.maxTouchPoints>0;
state.touchMove = 0;        // -1 / 0 / +1 : run left/right (left thumb)
state.aimSwivel = 0;        // -1 / 0 / +1 : sweep the gun (right thumb)
let autoFire = false;       // toggled by the AUTO button on phones
let heldFire = false;       // held FIRE button (manual)
let aimTouchId = null;      // (desktop tap-to-start only)

/* --- desktop mouse --- */
window.addEventListener("mousemove", e=>{
  const r=canvas.getBoundingClientRect();
  state.aimX=(e.clientX-r.left)*DPR; state.aimY=(e.clientY-r.top)*DPR;
});
window.addEventListener("mousedown", e=>{
  if(e.target.closest && e.target.closest(".mbtn")) return;
  press();
});

/* --- touch on the play field: only used to START the game --- */
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  if(AC.state==="suspended") AC.resume();
  if(state.mode==="title" || state.mode==="gameover"){ startGame(); }
},{passive:false});
canvas.addEventListener("touchmove", e=>{ e.preventDefault(); },{passive:false});

/* --- on-screen buttons --- */
function bindButton(id, onDown, onUp){
  const el=document.getElementById(id);
  if(!el) return;
  const down=e=>{ e.preventDefault(); el.classList.add("active"); if(AC.state==="suspended") AC.resume(); onDown&&onDown(); };
  const up  =e=>{ e.preventDefault(); el.classList.remove("active"); onUp&&onUp(); };
  el.addEventListener("touchstart",down,{passive:false});
  el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("touchcancel",up,{passive:false});
  el.addEventListener("mousedown",down);
  el.addEventListener("mouseup",up);
  el.addEventListener("mouseleave",e=>{ el.classList.remove("active"); onUp&&onUp(); });
}
// left thumb: run
bindButton("btnLeft",  ()=>state.touchMove=-1, ()=>{ if(state.touchMove===-1)state.touchMove=0; });
bindButton("btnRight", ()=>state.touchMove=1,  ()=>{ if(state.touchMove===1)state.touchMove=0; });
// right thumb: swivel the gun along the alien line
bindButton("btnAimL",  ()=>state.aimSwivel=-1, ()=>{ if(state.aimSwivel===-1)state.aimSwivel=0; });
bindButton("btnAimR",  ()=>state.aimSwivel=1,  ()=>{ if(state.aimSwivel===1)state.aimSwivel=0; });
// reload
bindButton("btnReload",()=>startReload());
// manual fire — hold to keep firing (independent of AUTO)
bindButton("btnFire",  ()=>{ heldFire=true; press(); }, ()=>heldFire=false);
// auto-fire toggle
const btnAuto=document.getElementById("btnAuto");
if(btnAuto){
  const toggle=e=>{
    e.preventDefault();
    if(AC.state==="suspended") AC.resume();
    autoFire=!autoFire;
    btnAuto.classList.toggle("on",autoFire);
    btnAuto.textContent = autoFire ? "AUTO ●" : "AUTO ○";
    // starting the game from the AUTO button if on a menu
    if(state.mode==="title" || state.mode==="gameover") startGame();
  };
  btnAuto.addEventListener("touchstart",toggle,{passive:false});
  btnAuto.addEventListener("mousedown",toggle);
}

/* --- keyboard --- */
window.addEventListener("keydown", e=>{
  keys[e.code]=true;
  if(e.code==="Space"){ e.preventDefault(); press(); }
  if(e.code==="KeyR") startReload();
});
window.addEventListener("keyup", e=>{ keys[e.code]=false; });

function press(){
  if(AC.state==="suspended") AC.resume();
  if(state.mode==="title" || state.mode==="gameover"){ startGame(); return; }
  if(state.mode==="play") fire();
}
// show touch controls only on touch devices
if(IS_TOUCH){
  document.body.classList.add("touch");
  // start the aim centered on the alien line
  state.aimX=CX; state.aimY=CY*0.62;
}

function startGame(){
  state.score=0; state.wave=1; state.lives=3;
  state.camX=0; state.vel=0;
  state.ammo=MAG_SIZE; state.reloading=false; state.look=0;
  buildShields();
  spawnWave();
  setMode("wavein", 1.6);
  hud();
}

function setMode(m, t=0){
  state.mode=m; state.modeTimer=t;
  const msg=$("msg");
  if(m==="title"){
    msg.innerHTML =
      "SKY INVADERS<br><span class='sub'>GROUND DEFENSE PERSPECTIVE</span><br><br>"+
      "<span class='sub'>THEY ARE DIRECTLY ABOVE YOU</span><br>"+
      "<span class='sub'>RUN · SHOOT THEIR SHOTS · HIDE UNDER THE SHIELDS</span><br><br>"+
      "<span class='sub blink'>CLICK / TAP TO MAN THE CANNON</span>";
  } else if(m==="wavein"){
    msg.innerHTML = "WAVE "+String(state.wave).padStart(2,"0")+"<br><span class='sub'>LOOK UP</span>";
  } else if(m==="gameover"){
    msg.innerHTML = "<span class='alert'>CANNON DESTROYED</span><br>"+
      "<span class='sub'>FINAL SCORE "+fmt(state.score)+"</span><br><br>"+
      "<span class='sub blink'>CLICK TO RE-ENLIST</span>";
  } else msg.innerHTML="";
}

/* ---------- reload ---------- */
function startReload(){
  if(state.reloading || state.ammo===MAG_SIZE) return;
  if(state.mode!=="play") return;
  state.reloading=true; state.reloadT=0;
  blip(220,0.1,"square",0.12,-80);
  hud();
}

/* ---------- firing ---------- */
let lastShot=0, shellSfx=0;
function fire(){
  if(state.reloading) return;
  if(state.ammo<=0){ blip(120,0.08,"square",0.1); startReload(); return; }
  const now=performance.now();
  if(now-lastShot<170) return;
  lastShot=now;
  state.ammo--;
  state.recoil=1;
  blip(880,0.09,"square",0.14,-700);
  if(state.ammo===0) setTimeout(startReload, 350);
  hud();

  /* hitscan — nearest thing under the crosshair:
     bombs, then your own shields, then invaders, then the UFO */
  let kind=null, ref=null, bestZ=Infinity;

  for(const bm of bombs){
    const p=project(bm.x,bm.y,bm.z);
    const rad=Math.max(26*DPR, sizeS(bm.z)*16*DPR);
    if(Math.hypot(state.aimX-p.x,state.aimY-p.y)<rad*1.6 && bm.z<bestZ){
      kind="bomb"; ref=bm; bestZ=bm.z;
    }
  }
  const rp=rayAtZ(SHIELD_Z);
  const shHit = shieldCellAt(rp.x, rp.y);
  if(shHit && SHIELD_Z<bestZ){ kind="shield"; ref=shHit; bestZ=SHIELD_Z; }

  for(const inv of invaders){
    if(!inv.alive) continue;
    const z=invZ(inv);
    const p=project(formation.x+inv.gx, formation.y+inv.gy, z);
    const _d = Math.min(1, Math.max(0,(640-z)/530));
    const _loom = 1 + _d*_d*3.2;
    const hw = 46*sizeS(z)*1.15*_loom, hh = 34*sizeS(z)*1.15*_loom;
    if(Math.abs(state.aimX-p.x)<hw && Math.abs(state.aimY-p.y)<hh && z<bestZ){
      kind="invader"; ref=inv; bestZ=z;
    }
  }
  if(ufo){
    const p=project(ufo.x,ufo.y,ufo.z);
    const hw=70*sizeS(ufo.z), hh=30*sizeS(ufo.z);
    if(Math.abs(state.aimX-p.x)<hw && Math.abs(state.aimY-p.y)<hh && ufo.z<bestZ){
      kind="ufo"; ref=ufo; bestZ=ufo.z;
    }
  }
  bolts.push({
    sx:state.aimX, sy:state.aimY, t:0,
    dur: kind? Math.max(0.12, Math.min(0.5, bestZ/2600)) : 0.4,
    kind, ref, z:bestZ
  });
}

function resolveBolt(b){
  if(b.kind==="bomb"){
    const i=bombs.indexOf(b.ref);
    if(i>=0){
      bombs.splice(i,1);
      state.score+=5;
      const p=project(b.ref.x,b.ref.y,b.ref.z);
      booms.push({x:p.x,y:p.y,t:0,scale:sizeS(b.ref.z)*0.5,color:"#ffb44d"});
      blip(640,0.07,"square",0.12,300); noiseBurst(0.1,0.1);
    }
  } else if(b.kind==="shield"){
    damageShield(b.ref.sh,b.ref.r,b.ref.c,1);
    booms.push({x:b.sx,y:b.sy,t:0,scale:0.5,color:"#3da04c"});
    blip(180,0.06,"square",0.1);
  } else if(b.kind==="invader" && b.ref.alive){
    b.ref.alive=false;
    state.score+=b.ref.pts;
    const p=project(formation.x+b.ref.gx, formation.y+b.ref.gy, b.z);
    booms.push({x:p.x,y:p.y,t:0,scale:sizeS(b.z),color:"#5dff6d"});
    noiseBurst(0.22,0.2);
  } else if(b.kind==="ufo" && ufo===b.ref){
    const bonus=[50,100,150,300][Math.floor(Math.random()*4)];
    state.score+=bonus;
    const p=project(ufo.x,ufo.y,ufo.z);
    booms.push({x:p.x,y:p.y,t:0,scale:1.4,color:"#ff66e0",label:bonus});
    ufo=null; noiseBurst(0.4,0.3);
  }
  state.hi=Math.max(state.hi,state.score);
  hud();
}

/* ---------- update ---------- */
function update(dt){
  /* running */
  let move=0;
  if(state.mode==="play"||state.mode==="wavein"||state.mode==="dying"){
    if(keys["KeyA"]||keys["ArrowLeft"])  move-=1;
    if(keys["KeyD"]||keys["ArrowRight"]) move+=1;
    move += state.touchMove;
    move = Math.max(-1,Math.min(1,move));
  }
  const RUN=560;
  state.vel += (move*RUN - state.vel)*Math.min(1,dt*10);
  state.camX += state.vel*dt;
  state.camX = Math.max(-PLAYER_RANGE,Math.min(PLAYER_RANGE,state.camX));
  state.sway += (state.vel/RUN*0.022 - state.sway)*Math.min(1,dt*6);

  /* aim swivel (right thumb) — sweep the crosshair along the alien line */
  if(state.aimSwivel!==0 && (state.mode==="play"||state.mode==="wavein"||state.mode==="dying")){
    const SWIVEL=620*DPR;
    state.aimX += state.aimSwivel*SWIVEL*dt;
    state.aimX = Math.max(30*DPR, Math.min(W-30*DPR, state.aimX));
  }
  // on touch, keep the crosshair pinned to the alien line height so it can't drift off
  if(IS_TOUCH && formation){
    const lineY = CY + formation.y*posS(formation.z);
    state.aimY += (lineY - state.aimY)*Math.min(1,dt*7);
  }

  // fire when AUTO toggle is on OR the manual FIRE button is held; fire() self-limits cadence
  if((autoFire || heldFire) && state.mode==="play"){
    if(state.reloading){ /* wait */ }
    else if(state.ammo>0) fire();
    else if(autoFire) startReload();   // AUTO reloads for you; manual doesn't force it
  }
  // footsteps
  if(Math.abs(state.vel)>120){
    state.stepT+=dt*Math.abs(state.vel)/130;
    if(state.stepT>1){ state.stepT=0; noiseBurst(0.04,0.05,300); }
  }

  state.recoil=Math.max(0,state.recoil-dt*6);
  state.shake=Math.max(0,state.shake-dt*3);

  /* reload sequence */
  if(state.reloading){
    state.reloadT+=dt;
    const t=state.reloadT;
    if(t<RELOAD_DOWN) state.look=t/RELOAD_DOWN;
    else if(t<RELOAD_DOWN+RELOAD_LOAD){
      state.look=1;
      const phase=Math.floor((t-RELOAD_DOWN)/(RELOAD_LOAD/MAG_SIZE));
      if(phase>shellSfx){ shellSfx=phase; blip(340+phase*60,0.05,"square",0.1); }
    }
    else if(t<RELOAD_TOTAL) state.look=1-(t-RELOAD_DOWN-RELOAD_LOAD)/RELOAD_UP;
    else{
      state.reloading=false; state.look=0; state.ammo=MAG_SIZE; shellSfx=0;
      blip(700,0.1,"square",0.14,200);
      hud();
    }
  } else {
    state.look=Math.max(0,state.look-dt*4);
  }
  state.look=Math.max(0,Math.min(1,state.look));

  if(state.modeTimer>0){
    state.modeTimer-=dt;
    if(state.modeTimer<=0){
      if(state.mode==="wavein") setMode("play");
      else if(state.mode==="dying"){
        if(state.lives<=0){
          state.hi=Math.max(state.hi,state.score);
          setMode("gameover");
        } else {
          formation.z += 300;
          bombs=[];
          state.ammo=MAG_SIZE; state.reloading=false; state.look=0; shellSfx=0;
          setMode("play");
        }
        hud();
      }
    }
  }

  if(state.mode!=="play"){ updateFX(dt); return; }

  /* formation march */
  const alive=aliveCount();
  if(alive===0){
    state.wave++; spawnWave(); setMode("wavein",1.6); hud();
    blip(523,0.12,"square",0.15); setTimeout(()=>blip(659,0.12),120); setTimeout(()=>blip(784,0.16),240);
    return;
  }
  const speedScale = 1 + (1-alive/25)*2.2;
  formation.x += formation.dir * formation.speed * speedScale * dt;
  if(Math.abs(formation.x) > formation.limit){
    formation.x = Math.sign(formation.x)*formation.limit;
    formation.dir*=-1;
    formation.z -= formation.drop;
    blip(60,0.1,"sawtooth",0.18);
  }
  formation.frameTimer+=dt;
  const interval = Math.max(0.12, 0.65 * (alive/25));
  if(formation.frameTimer>interval){
    formation.frameTimer=0;
    for(const inv of invaders) inv.frame^=1;
    blip(MARCH[marchIdx],0.09,"square",0.10);
    marchIdx=(marchIdx+1)%4;
  }

  /* invaders reaching you */
  for(const inv of invaders){
    if(inv.alive && invZ(inv) < Z_NEAR){ playerHit("AN INVADER REACHED YOU"); break; }
  }

  /* bombing — columns fall straight down, biased toward your lane */
  if(Math.random() < dt*(0.6+state.wave*0.2)){
    const fronts={};
    for(const inv of invaders){
      if(!inv.alive) continue;
      if(!fronts[inv.gx] || inv.zOff<fronts[inv.gx].zOff) fronts[inv.gx]=inv;
    }
    const pool=Object.values(fronts);          // only the visible front rank fires
    if(pool.length){
      pool.sort((a,b)=>Math.abs(formation.x+a.gx-state.camX)-Math.abs(formation.x+b.gx-state.camX));
      const src = Math.random()<0.5 ? pool[0] : pool[Math.floor(Math.random()*pool.length)];
      const z0=invZ(src);
      bombs.push({
        x:formation.x+src.gx,
        y0:formation.y+src.gy, y:formation.y+src.gy, z0,
        z:z0,
        v: 290 + state.wave*36,
        phase:Math.random()*10
      });
      blip(300,0.1,"sawtooth",0.06,-180);
    }
  }
  for(let i=bombs.length-1;i>=0;i--){
    const b=bombs[i];
    const prevZ=b.z;
    b.z -= b.v*dt;
    b.y = b.y0 * Math.max(0,b.z/b.z0);     // converges to your lane (y=0) at the ground
    b.phase += dt*14;
    /* shield interception */
    if(b.z<=SHIELD_Z && prevZ>SHIELD_Z){
      const hit=shieldCellAt(b.x, b.y0*(SHIELD_Z/b.z0));
      if(hit){
        damageShield(hit.sh,hit.r,hit.c,1);
        const p=project(b.x,b.y,SHIELD_Z);
        booms.push({x:p.x,y:p.y,t:0,scale:0.7,color:"#3da04c"});
        bombs.splice(i,1);
        noiseBurst(0.1,0.1);
        continue;
      }
    }
    /* ground impact */
    if(b.z<=14){
      const d=Math.abs(b.x-state.camX);
      bombs.splice(i,1);
      if(d<110 && state.mode==="play"){ playerHit("DIRECT HIT"); }
      else { state.shake=Math.min(1,state.shake+0.3); noiseBurst(0.15,0.1); }
    }
  }

  /* UFO */
  if(!ufo && Math.random()<dt*0.045){
    const side=Math.random()<0.5?-1:1;
    ufo={x:side*1500, y:-260, z:Z_START*1.25, vx:-side*380, hum:0};
    blip(1200,0.3,"triangle",0.06,-300);
  }
  if(ufo){
    ufo.x+=ufo.vx*dt; ufo.hum+=dt;
    if(ufo.hum>0.18){ ufo.hum=0; blip(900+Math.random()*200,0.07,"triangle",0.045); }
    if(Math.abs(ufo.x)>1700) ufo=null;
  }

  updateFX(dt);
}

function updateFX(dt){
  for(let i=bolts.length-1;i>=0;i--){
    const b=bolts[i]; b.t+=dt;
    if(b.t>=b.dur){ resolveBolt(b); bolts.splice(i,1); }
  }
  for(let i=booms.length-1;i>=0;i--){ booms[i].t+=dt; if(booms[i].t>0.55) booms.splice(i,1); }
  for(const s of stars) s.tw+=dt*2;
}

function playerHit(why){
  state.lives--;
  state.shake=1;
  $("hitFlash").style.opacity=1;
  setTimeout(()=>$("hitFlash").style.opacity=0,180);
  noiseBurst(0.5,0.4);
  blip(160,0.4,"sawtooth",0.2,-120);
  setMode("dying",1.4);
  $("msg").innerHTML="<span class='alert'>"+why+"</span>";
  hud();
}

/* ---------- render ---------- */
function render(){
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  if(state.shake>0){
    ctx.translate((Math.random()*2-1)*14*state.shake,(Math.random()*2-1)*14*state.shake);
  }
  /* running sway — slight head tilt */
  if(Math.abs(state.sway)>0.001){
    ctx.translate(CX,CY); ctx.rotate(state.sway); ctx.translate(-CX,-CY);
  }

  const off = state.look * H * 0.72;

  ctx.save();
  ctx.translate(0,-off);
  renderSky();
  ctx.restore();

  if(off>1) renderGround(off);

  renderGroundRim();
  renderRadar();

  if((state.mode==="play"||state.mode==="wavein"||state.mode==="dying") && state.look<0.25){
    drawCrosshair(state.aimX,state.aimY);
  }
}

function renderSky(){
  const g=ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.7);
  g.addColorStop(0,"#02030a");
  g.addColorStop(0.75,"#060d1c");
  g.addColorStop(1,"#0c1f2e");
  ctx.fillStyle=g; ctx.fillRect(-30,-30,W+60,H+H);

  // stars sweep past as you run
  ctx.fillStyle="#cfe8ff";
  for(const s of stars){
    let px = CX + s.x*W*0.9 - state.camX*0.55*s.z*DPR;
    // wrap so running never empties the sky
    const span=W*1.9;
    px = ((px+span*10) % span) - (span-W)/2;
    const py = CY + s.y*H*0.85;
    ctx.globalAlpha=(0.25+0.5*Math.abs(Math.sin(s.tw)))*s.z;
    ctx.fillRect(px,py, 2*DPR*s.z, 2*DPR*s.z);
  }
  ctx.globalAlpha=1;

  if(ufo){
    const p=project(ufo.x,ufo.y,ufo.z);
    const spr=getSprite("ufo",0,"#ff66e0");
    const sc=sizeS(ufo.z);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(spr,p.x-spr.width*sc*0.08*DPR,p.y-spr.height*sc*0.08*DPR,
                  spr.width*sc*0.16*DPR,spr.height*sc*0.16*DPR);
  }

  // invaders — tight block, far to near
  const drawList=[];
  for(const inv of invaders){
    if(!inv.alive) continue;
    const z=invZ(inv);
    drawList.push({inv,z,p:project(formation.x+inv.gx, formation.y+inv.gy, z)});
  }
  drawList.sort((a,b)=>b.z-a.z);
  ctx.imageSmoothingEnabled=false;
  for(const {inv,z,p} of drawList){
    const danger = Math.min(1, Math.max(0,(640-z)/530));
    const color = danger>0.55 ? "#ff5a5a" : (danger>0.25? "#ffd95a" : "#5dff6d");
    const spr=getSprite(inv.type,inv.frame,color);
    const sc=sizeS(z);
    // base size grows with proximity; loom makes it accelerate as they drop close
    const loom = 0.085 * (1 + danger*danger*3.2);
    const w=spr.width*sc*loom*DPR, h=spr.height*sc*loom*DPR;
    ctx.globalAlpha = Math.min(1, 0.35 + sc*1.4);
    ctx.drawImage(spr, p.x-w/2, p.y-h/2, w, h);
  }
  ctx.globalAlpha=1;

  // bombs — zigzag bolts in falling columns
  for(const b of bombs){
    const p=project(b.x,b.y,b.z);
    const sc=Math.min(4,sizeS(b.z));
    const seg=9*sc*DPR, wob=(Math.floor(b.phase)%2? 1:-1)*4*sc*DPR;
    ctx.strokeStyle="#fff";
    ctx.lineWidth=Math.max(2,2.6*sc*DPR);
    ctx.shadowColor="#ff9a3c"; ctx.shadowBlur=14;
    ctx.beginPath();
    ctx.moveTo(p.x-wob, p.y-seg*1.5);
    ctx.lineTo(p.x+wob, p.y-seg*0.5);
    ctx.lineTo(p.x-wob, p.y+seg*0.5);
    ctx.lineTo(p.x+wob, p.y+seg*1.5);
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  renderShields();

  // bolts
  for(const b of bolts){
    const f=b.t/b.dur;
    const ox=CX, oy=H+40;
    const x = ox + (b.sx-ox)*f,             y = oy + (b.sy-oy)*f;
    const x2= ox + (b.sx-ox)*Math.max(0,f-0.18), y2= oy + (b.sy-oy)*Math.max(0,f-0.18);
    ctx.strokeStyle="#a8ffb0";
    ctx.lineWidth=(1-f)*7*DPR+1.5;
    ctx.shadowColor="#5dff6d"; ctx.shadowBlur=18;
    ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x,y); ctx.stroke();
    ctx.shadowBlur=0;
  }

  // explosions
  for(const e of booms){
    const f=e.t/0.55;
    const r=60*(Math.min(3,(e.scale||1)*1.2+0.4))*DPR*(0.3+f);
    ctx.strokeStyle=e.color||"#5dff6d";
    ctx.globalAlpha=1-f;
    ctx.lineWidth=3*DPR;
    for(let k=0;k<8;k++){
      const a=k*Math.PI/4+f*0.5;
      ctx.beginPath();
      ctx.moveTo(e.x+Math.cos(a)*r*0.3, e.y+Math.sin(a)*r*0.3);
      ctx.lineTo(e.x+Math.cos(a)*r,     e.y+Math.sin(a)*r);
      ctx.stroke();
    }
    if(e.label){
      ctx.fillStyle="#ff66e0";
      ctx.font=`bold ${22*DPR}px "Courier New",monospace`;
      ctx.textAlign="center";
      ctx.fillText(e.label, e.x, e.y-r-8);
    }
    ctx.globalAlpha=1;
  }

  drawCannon();
}

function renderShields(){
  const ps = posS(SHIELD_Z), cs = camS(SHIELD_Z);
  const cw = (SHIELD_W/SH_COLS)*ps, ch=(SHIELD_H/SH_ROWS)*ps;
  for(const sh of shields){
    const left = CX + (sh.x - SHIELD_W/2)*ps - state.camX*cs;
    const top  = CY + (sh.y - SHIELD_H/2)*ps;
    if(left>W+80 || left+SHIELD_W*ps<-80) continue;
    for(let r=0;r<SH_ROWS;r++){
      for(let c=0;c<SH_COLS;c++){
        const hp=sh.cells[r][c];
        if(hp<=0) continue;
        ctx.fillStyle = hp===2 ? "rgba(22,64,30,0.94)" : "rgba(14,38,18,0.86)";
        ctx.fillRect(left+c*cw, top+r*ch, cw+0.5, ch+0.5);
        if(hp===2){
          ctx.fillStyle="rgba(93,255,109,0.16)";
          ctx.fillRect(left+c*cw, top+r*ch, cw+0.5, 2*DPR);
        }
      }
    }
  }
}

/* a strip of ground at the very bottom edge that scrolls as you run */
function renderGroundRim(){
  if(state.look>0.4) return;
  const h=26*DPR, y=H-h;
  ctx.fillStyle="rgba(16,12,8,0.9)";
  ctx.fillRect(0,y,W,h);
  ctx.strokeStyle="rgba(255,150,70,0.25)";
  ctx.lineWidth=1.5*DPR;
  ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  // scrolling tick marks = your motion over the ground
  const spacing=90*DPR, k=1.15*DPR;
  let start = (-state.camX*k) % spacing;
  if(start<0) start+=spacing;
  ctx.strokeStyle="rgba(255,170,90,0.5)";
  ctx.lineWidth=2*DPR;
  for(let x=start-spacing; x<W+spacing; x+=spacing){
    ctx.beginPath(); ctx.moveTo(x,y+6*DPR); ctx.lineTo(x-10*DPR,y+h-4*DPR); ctx.stroke();
  }
}

/* radar strip: you, the shields, incoming bombs, formation extent */
function renderRadar(){
  if(state.look>0.6) return;
  const rw=Math.min(W*0.46, 560*DPR), rh=44*DPR;
  const rx=CX-rw/2, ry=H-rh-58*DPR;
  const mapX=v=> rx + ((v+PLAYER_RANGE+90)/( (PLAYER_RANGE+90)*2 ))*rw;

  ctx.fillStyle="rgba(2,8,4,0.72)";
  ctx.strokeStyle="rgba(93,255,109,0.35)";
  ctx.lineWidth=1.5*DPR;
  ctx.beginPath(); ctx.roundRect(rx,ry,rw,rh,6*DPR); ctx.fill(); ctx.stroke();

  // formation extent (top band)
  const fz=formation? formation.z : Z_START;
  const closeness=Math.max(0,Math.min(1,1-(fz-Z_NEAR)/(Z_START-Z_NEAR)));
  ctx.fillStyle=`rgba(255,${Math.round(120-90*closeness)+90},80,${0.25+0.45*closeness})`;
  const fx1=mapX(formation? formation.x-560 : -560), fx2=mapX(formation? formation.x+560 : 560);
  ctx.fillRect(Math.max(rx,fx1), ry+3*DPR, Math.min(rx+rw,fx2)-Math.max(rx,fx1), 5*DPR);

  // shields
  for(const sh of shields){
    let total=0,max=SH_COLS*SH_ROWS*2;
    for(const row of sh.cells) for(const c of row) total+=c;
    const a=0.25+0.65*(total/max);
    ctx.fillStyle=`rgba(93,255,109,${a})`;
    const x1=mapX(sh.x-SHIELD_W/2), x2=mapX(sh.x+SHIELD_W/2);
    ctx.fillRect(x1, ry+rh*0.42, x2-x1, 7*DPR);
  }

  // incoming bombs: x position, height within strip = altitude
  for(const b of bombs){
    const bx=mapX(b.x);
    const f=Math.max(0,Math.min(1,1-b.z/Z_START));
    ctx.fillStyle="#ff9a3c";
    ctx.fillRect(bx-1.5*DPR, ry+6*DPR+f*(rh-18*DPR), 3*DPR, 6*DPR);
  }

  // you
  const px=mapX(state.camX);
  ctx.fillStyle = shieldCoversX(state.camX) ? "#5dff6d" : "#ffffff";
  ctx.beginPath();
  ctx.moveTo(px, ry+rh-13*DPR);
  ctx.lineTo(px-6*DPR, ry+rh-3*DPR);
  ctx.lineTo(px+6*DPR, ry+rh-3*DPR);
  ctx.fill();
}

function renderGround(off){
  const top = H - off;
  const horizonY = top + 8*DPR;

  const g=ctx.createLinearGradient(0,horizonY,0,H);
  g.addColorStop(0,"#1a130c");
  g.addColorStop(0.25,"#241a10");
  g.addColorStop(1,"#0c0805");
  ctx.fillStyle=g;
  ctx.fillRect(0,horizonY,W,H-horizonY);

  ctx.fillStyle="rgba(255,140,60,0.10)";
  ctx.fillRect(0,horizonY-10*DPR,W,18*DPR);
  ctx.fillStyle="#120d08";
  ctx.beginPath();
  ctx.moveTo(0,horizonY);
  ctx.lineTo(W*0.08,horizonY); ctx.lineTo(W*0.13,horizonY-26*DPR); ctx.lineTo(W*0.24,horizonY-26*DPR); ctx.lineTo(W*0.28,horizonY);
  ctx.lineTo(W*0.62,horizonY); ctx.lineTo(W*0.67,horizonY-38*DPR); ctx.lineTo(W*0.80,horizonY-38*DPR); ctx.lineTo(W*0.85,horizonY);
  ctx.lineTo(W,horizonY); ctx.lineTo(W,horizonY+2); ctx.lineTo(0,horizonY+2);
  ctx.fill();

  if(state.look>0.85 && state.reloading){
    const t=state.reloadT-RELOAD_DOWN;
    const loaded=Math.max(0,Math.min(MAG_SIZE,Math.floor(t/(RELOAD_LOAD/MAG_SIZE))+(t>0?1:0)));
    // fit the shell slots to the magazine size
    const slotW=Math.min(24, 300/MAG_SIZE)*DPR;
    const gap=slotW*0.5;
    const pitch=slotW+gap;
    const boxW=Math.max(340, MAG_SIZE*pitch/DPR + 60)*DPR;
    const bx=CX, by=H*0.74;
    ctx.fillStyle="#101c12";
    ctx.strokeStyle="#2f6b3c"; ctx.lineWidth=2*DPR;
    ctx.beginPath();
    ctx.roundRect(bx-boxW/2,by-46*DPR,boxW,92*DPR,10*DPR);
    ctx.fill(); ctx.stroke();
    const startX = bx - (MAG_SIZE-1)*pitch/2;
    for(let i=0;i<MAG_SIZE;i++){
      const sx=startX+i*pitch;
      ctx.fillStyle = i<loaded ? "#5dff6d" : "rgba(93,255,109,0.12)";
      ctx.beginPath();
      ctx.roundRect(sx-slotW/2,by-26*DPR,slotW,52*DPR,5*DPR);
      ctx.fill();
    }
    ctx.fillStyle="#5dff6d";
    ctx.font=`bold ${16*DPR}px "Courier New",monospace`;
    ctx.textAlign="center";
    ctx.fillText("RELOADING — EYES DOWN — KEEP MOVING", bx, by+78*DPR);
  }
}

function drawCannon(){
  // the mount leans opposite your run, like you're hauling it with you
  const lean = -state.vel*0.04*DPR;
  const baseX=CX+lean, baseY=H+30*DPR;
  const ang=Math.atan2(state.aimY-baseY, state.aimX-baseX);
  const len=(120-state.recoil*26)*DPR, bw=26*DPR;
  ctx.save();
  ctx.translate(baseX,baseY); ctx.rotate(ang);
  ctx.fillStyle="#0a1810";
  ctx.strokeStyle="#2f6b3c"; ctx.lineWidth=2*DPR;
  ctx.beginPath(); ctx.rect(0,-bw/2,len,bw); ctx.fill(); ctx.stroke();
  ctx.fillStyle=`rgba(93,255,109,${0.25+state.recoil*0.6})`;
  ctx.fillRect(len-6*DPR,-bw/2,6*DPR,bw);
  ctx.restore();
  ctx.fillStyle="#050b07";
  ctx.beginPath();
  ctx.moveTo(baseX-150*DPR,H);
  ctx.quadraticCurveTo(baseX,H-70*DPR,baseX+150*DPR,H);
  ctx.fill();
}

function drawCrosshair(x,y){
  const r=20*DPR;
  ctx.strokeStyle = state.ammo>0 ? "rgba(93,255,109,.95)" : "rgba(255,77,77,.95)";
  ctx.lineWidth=2*DPR;
  ctx.shadowColor= state.ammo>0 ? "#5dff6d" : "#ff4d4d";
  ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x-r*1.7,y); ctx.lineTo(x-r*0.6,y);
  ctx.moveTo(x+r*0.6,y); ctx.lineTo(x+r*1.7,y);
  ctx.moveTo(x,y-r*1.7); ctx.lineTo(x,y-r*0.6);
  ctx.moveTo(x,y+r*0.6); ctx.lineTo(x,y+r*1.7);
  ctx.stroke();
  ctx.shadowBlur=0;
}

/* ---------- main loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
setMode("title");
hud();
state.aimX=CX; state.aimY=CY*0.6;
requestAnimationFrame(loop);
</script>
</body>
</html>
